{# Complete reactive form template - Bulma CSS #}
{% load reactive_forms %}

<form method="post" data-signals='{{ form.get_signals_json }}' {% if form_attrs %}{{ form_attrs }}{% endif %}>
    {% csrf_token %}

    {% for field in form %}
        {% render_reactive_field field %}
    {% endfor %}

    {% if submit_label %}
    <div class="field">
        <div class="control">
            <button type="submit" class="button is-primary">{{ submit_label }}</button>
        </div>
    </div>
    {% endif %}
</form>
