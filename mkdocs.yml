site_name: rg.forms
site_description: Reactive Django Forms with Datastar integration
site_url: https://raccoongang.github.io/rg.forms
repo_url: https://github.com/raccoongang/rg.forms
repo_name: raccoongang/rg.forms

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Guide:
      - Visibility Rules: guide/visibility.md
      - Computed Fields: guide/computed.md
      - Conditional Attributes: guide/conditional-attrs.md
      - Cascading Dropdowns: guide/cascading.md
      - Field Groups: guide/field-groups.md
      - Validation: guide/validation.md
      - SSE Validation: guide/sse-validation.md
      - Datastar Integration: guide/datastar.md
  - Reference:
      - Fields: reference/fields.md
      - ReactiveForm: reference/forms.md
      - Template Tags: reference/template-tags.md
  - Examples: examples.md
